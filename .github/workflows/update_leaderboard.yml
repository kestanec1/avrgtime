name: Update MCSR Leaderboard

on:
  schedule:
    # Her 35 dakikada bir otomatik çalışır (Aylık 2000 dakika limitini aşmamak için)
    - cron: '*/35 * * * *'
  workflow_dispatch: # İstediğinde Actions sekmesinden elle de başlatabilmen için

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Python script
      run: python mcsr_filtre.py

    - name: Commit and push if HTML changed
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add index.html mcsr_liderlik_ilk100.txt || true
        git commit -m "Auto-update leaderboard data" || true
        git push
