name: Update MCSR Leaderboard

on:
  schedule:
    - cron: '*/35 * * * *'
  push:
    branches:
      - main
  workflow_dispatch:

env:
  TZ: "America/Toronto"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Python script
      run: python mcsr_filtre.py

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add index.html mcsr_liderlik_ilk100.txt || true
        
        # Sistemi sürekli uyanık tutan hileli kısım
        echo "Son tetiklenme saati: $(date)" > son_calisma.txt
        git add son_calisma.txt
        
        git commit -m "Auto-update and trigger next cycle" || true
        git pull --rebase origin main || true
        git push origin main
